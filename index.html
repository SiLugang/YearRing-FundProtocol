<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YearRing-FundProtocol</title>
  <!-- Redirect to current version -->
  <meta http-equiv="refresh" content="0; url=./v01/" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; padding: 48px 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117; color: #e6edf3;
      min-height: 100vh;
    }
    h1 { margin: 0 0 6px; font-size: 1.4rem; font-weight: 600; }
    .subtitle { color: #8b949e; font-size: 0.85rem; margin-bottom: 40px; }
    .versions { display: flex; flex-direction: column; gap: 12px; max-width: 480px; }
    .version-card {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      text-decoration: none; color: inherit;
      transition: border-color 0.15s;
    }
    .version-card:hover { border-color: #58a6ff; }
    .version-card.current { border-color: #238636; }
    .version-card .vname { font-weight: 600; font-size: 0.95rem; }
    .version-card .vmeta { color: #8b949e; font-size: 0.8rem; margin-top: 3px; }
    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 600;
      background: #1a4731; color: #3fb950;
    }
    .badge.archived { background: #21262d; color: #8b949e; }
    .redirect-note { color: #8b949e; font-size: 0.82rem; margin-bottom: 28px; }
    .redirect-note a { color: #58a6ff; }
  </style>
</head>
<body>

<h1>YearRing-FundProtocol</h1>
<div class="subtitle">FinancialBase Protocol · Base Mainnet · Dashboard versions</div>

<p class="redirect-note">
  Redirecting to current version…
  If not redirected automatically, <a href="./v01/">click here</a>.
</p>

<div class="versions">

  <!-- Current version — update href + badge text when upgrading to v02, v03… -->
  <a class="version-card current" href="./v01/">
    <div>
      <div class="vname">v01</div>
      <div class="vmeta">FundVaultV01 · StrategyManagerV01 · Step 3 Whitelist Run</div>
    </div>
    <span class="badge">Current</span>
  </a>

  <!-- Upgrade template — uncomment and fill in when adding v02:
  <a class="version-card current" href="./v02/">
    <div>
      <div class="vname">v02</div>
      <div class="vmeta">FundVaultV02 · Multi-strategy · Step 4</div>
    </div>
    <span class="badge">Current</span>
  </a>
  <a class="version-card" href="./v01/">
    <div>
      <div class="vname">v01</div>
      <div class="vmeta">FundVaultV01 · StrategyManagerV01 · Step 3 (archived)</div>
    </div>
    <span class="badge archived">Archived</span>
  </a>
  -->

</div>

<script>
  // JS redirect fallback (meta refresh handles most browsers)
  window.location.replace("./v01/");
</script>

</body>
</html>
